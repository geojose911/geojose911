name: 🐍 Generate Contribution Snake

on:
  # Run every 24 hours automatically
  schedule:
    - cron: "0 0 * * *"

  # Allow manual trigger from Actions tab
  workflow_dispatch:

  # Also run on push to main
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate snake animation
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Generate snake animation (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: geojose911
          outputs: |
            dist/snake-light.svg
            dist/snake-dark.svg?palette=github-dark

      - name: 🚀 Commit and push generated SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate contribution snake 🐍"
          branch: main

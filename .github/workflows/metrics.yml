name: Metrics
on:
  # Schedule updates daily at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run it manually from the Actions tab
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token (Generated in Step 3)
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: geojose911
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
          
          # Plugins used in the template image
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          
          # Isometric Commit Calendar (The 3D block chart)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Habits and Recent Activity
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Tech stack icons
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_mode: icons
          plugin_topics_limit: 20
